name: Deploy Privacy Policy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "public/privacy-policy.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          cp public/privacy-policy.html _site/privacy-policy.html
          cp public/privacy-policy.html _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
